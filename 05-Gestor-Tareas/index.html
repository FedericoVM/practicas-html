<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas</title>
</head>
<body>
    <main>
        <h1>Mis Tareas Pendientes</h1>
        <section>
            <input type="text" name="tarea_hacer" id="tarea_hacer" placeholder="¿Qué necesitas hacer hoy?">
            <button type="button">Agregar Tarea</button>
        </section>
        <section>
            <ul>
                <li>
                    <input type="checkbox" name="tarea" id="tarea" checked>
                    <span>Estudiar etiquetas semanticas </span>
                    <button>Borrar</button>
                </li>
                 <li>
                    <input type="checkbox" name="tarea_dos" id="tarea_dos">
                    <span>Tomar 2 litros de agua </span>
                    <button>Borrar</button>
                </li>
                 <li>
                    <input type="checkbox" name="tarea_tres" id="tarea_tres" checked>
                    <span>Avanzar en el proyecto de GitHub </span>
                    <button>Borrar</button>
                </li>
            </ul>
            <hr>
            <p>Tienes 2 tareas pendientes</p>
            <button>Limpiar Completadas</button>
        </section>
    </main>
</body>
</html>
